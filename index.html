<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#1A2B48"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Collector's Library"/>
  <title>Collector's Library — Prototype iPhone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&display=swap"/>
  <style>
    html, body {
      margin: 0; padding: 0;
      font-family: -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100dvh;
      background: #F4F6FB;
      overscroll-behavior-y: none;
    }
    /* On desktop, surround the app with a soft frame */
    @media (min-width: 600px) {
      body {
        background:
          radial-gradient(circle at 20% 10%, #E8ECF5 0%, transparent 50%),
          radial-gradient(circle at 80% 90%, #F4EDE0 0%, transparent 50%),
          #EEF1F8;
        padding: 24px 0;
      }
      .app-shell {
        height: min(880px, calc(100dvh - 48px)) !important;
        border-radius: 28px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.08);
      }
    }
    button { -webkit-tap-highlight-color: transparent; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="screens2.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
